<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ماجد — مساعد إنجوسوفت الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ───────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; -webkit-font-smoothing:antialiased; }

/* ── Engosoft Design Tokens ──────────────────────────── */
:root {
  /* Brand palette */
  --en-900: #04101f;
  --en-800: #071727;
  --en-700: #0b1f38;
  --en-600: #0f2a4a;
  --en-500: #1a3a6b;
  --en-400: #2563eb;
  --en-300: #3b82f6;
  --en-200: #93c5fd;
  --gold:   #f59e0b;
  --gold-l: #fbbf24;

  /* Semantic */
  --bg:           var(--en-900);
  --surface:      var(--en-700);
  --elevated:     var(--en-600);
  --accent:       var(--en-400);
  --accent-glow:  rgba(37,99,235,.35);
  --text:         #f1f5f9;
  --muted:        #94a3b8;
  --border:       rgba(37,99,235,.18);

  /* Voice-state colors */
  --c-idle:   var(--en-400);
  --c-listen: #22c55e;
  --c-think:  var(--gold);
  --c-speak:  var(--en-300);
  --g-listen: rgba(34,197,94,.35);
  --g-think:  rgba(245,158,11,.35);
  --g-speak:  rgba(59,130,246,.35);

  /* Motion */
  --ease-expo:   cubic-bezier(0.16,1,0.3,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
}

body {
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ── Ambient blobs ───────────────────────────────────── */
.ambient {
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
.blob {
  position:absolute; border-radius:50%; filter:blur(90px);
  animation:drift 14s ease-in-out infinite alternate;
}
.blob-1 {
  width:520px; height:520px;
  background:var(--en-400); opacity:.1;
  top:-120px; left:50%; transform:translateX(-50%);
  animation-name:drift1;
}
.blob-2 {
  width:280px; height:280px;
  background:var(--gold); opacity:.07;
  bottom:5%; right:-80px;
  animation-delay:-5s;
}
@keyframes drift1 {
  from { transform:translateX(-50%) translateY(0); }
  to   { transform:translateX(-50%) translateY(-50px); }
}
@keyframes drift {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(-25px,30px) scale(1.08); }
}

/* ── App shell ───────────────────────────────────────── */
.app {
  position:relative; z-index:1;
  height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  max-width:480px;
  margin:0 auto;
}

/* ── Header ──────────────────────────────────────────── */
.header {
  display:flex; align-items:center; gap:12px;
  padding:14px 20px;
  background:rgba(7,23,39,.7);
  backdrop-filter:blur(16px) saturate(1.4);
  border-bottom:1px solid var(--border);
}

.logo {
  width:40px; height:40px; flex-shrink:0;
  background:linear-gradient(145deg,var(--en-500),var(--en-700));
  border:1.5px solid rgba(245,158,11,.45);
  border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:900; color:var(--gold-l);
  letter-spacing:-.3px;
  box-shadow:0 0 16px rgba(245,158,11,.12), 0 2px 8px rgba(0,0,0,.4);
}

.h-info { flex:1; }
.h-info .h-brand { font-size:14px; font-weight:700; line-height:1.2; }
.h-info .h-sub   { font-size:11px; color:var(--muted); margin-top:1px; }

.conn {
  display:flex; align-items:center; gap:6px;
  padding:5px 11px;
  border-radius:20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  font-size:11px; color:var(--muted);
  transition:all .4s var(--ease-expo);
  white-space:nowrap;
}
.conn.ok  { color:#22c55e; border-color:rgba(34,197,94,.3); background:rgba(34,197,94,.07); }
.conn.err { color:#ef4444; border-color:rgba(239,68,68,.3);  background:rgba(239,68,68,.07); }
.conn-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }
.conn.ok .conn-dot { animation:dotPulse 2s ease-in-out infinite; }
@keyframes dotPulse { 0%,100%{opacity:1}50%{opacity:.35} }

/* ── Stage ───────────────────────────────────────────── */
.stage {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:16px 20px 0;
  gap:0;
  overflow:hidden;
}

/* ── Avatar ──────────────────────────────────────────── */
.av-wrap {
  position:relative;
  margin-bottom:22px;
}

/* Outer ambient glow */
.av-glow {
  position:absolute; inset:-20px;
  border-radius:50%;
  background:radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 65%);
  opacity:0; pointer-events:none;
  transition:opacity .5s var(--ease-expo), background .4s;
}
.av-wrap.listening .av-glow { opacity:1; background:radial-gradient(ellipse at center,var(--g-listen) 0%,transparent 65%); }
.av-wrap.thinking  .av-glow { opacity:1; background:radial-gradient(ellipse at center,var(--g-think) 0%,transparent 65%); }
.av-wrap.speaking  .av-glow { opacity:1; background:radial-gradient(ellipse at center,var(--g-speak) 0%,transparent 65%); }

/* Animated border ring */
.av-ring {
  position:absolute; inset:-5px; border-radius:50%;
  border:2px solid transparent;
  transition:border-color .4s;
}
.av-wrap.listening .av-ring { border-color:var(--c-listen); animation:ringPulse 1s ease-in-out infinite; }
.av-wrap.thinking  .av-ring { border-color:var(--c-think);  animation:spinRing 1s linear infinite; }
.av-wrap.speaking  .av-ring { border-color:var(--c-speak);  animation:ringPulse 1.5s ease-in-out infinite; }
@keyframes ringPulse { 0%,100%{transform:scale(1);opacity:.8}  50%{transform:scale(1.04);opacity:.4} }
@keyframes spinRing  { to{transform:rotate(360deg)} }

/* Ripple behind avatar */
.av-ripple {
  position:absolute; inset:-5px; border-radius:50%;
  border:2px solid currentColor; color:var(--c-speak);
  opacity:0; pointer-events:none;
}
.av-wrap.speaking .av-ripple {
  animation:rippleOut 1.8s ease-out infinite;
}
.av-wrap.listening .av-ripple {
  color:var(--c-listen);
  animation:rippleOut 1.2s ease-out infinite;
}
@keyframes rippleOut {
  0%   { transform:scale(1); opacity:.5; }
  100% { transform:scale(1.55); opacity:0; }
}

/* Circle */
.av-circle {
  width:200px; height:200px; border-radius:50%; overflow:hidden;
  border:2px solid rgba(37,99,235,.25);
  background:var(--en-700);
  box-shadow:0 24px 64px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04) inset;
  transition:border-color .4s var(--ease-expo);
}
.av-wrap.listening .av-circle { border-color:rgba(34,197,94,.5); }
.av-wrap.thinking  .av-circle { border-color:rgba(245,158,11,.5); }
.av-wrap.speaking  .av-circle { border-color:rgba(59,130,246,.5); }

#avideo { width:100%; height:100%; object-fit:cover; display:none; }

.av-ph {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(180deg,var(--en-600) 0%,var(--en-700) 100%);
}

/* ── Identity ────────────────────────────────────────── */
.identity { text-align:center; margin-bottom:16px; }
.identity .name {
  font-size:26px; font-weight:900; line-height:1.2;
  background:linear-gradient(135deg,#93c5fd,#dbeafe);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.identity .role {
  font-size:12px; color:var(--muted); margin-top:5px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.identity .role::before,
.identity .role::after {
  content:''; display:block; width:24px; height:1px;
  background:linear-gradient(90deg,transparent,var(--border));
}
.identity .role::before { background:linear-gradient(90deg,transparent,var(--border)); }
.identity .role::after  { background:linear-gradient(90deg,var(--border),transparent); }

/* ── Status badge ────────────────────────────────────── */
.status {
  display:inline-flex; align-items:center; gap:7px;
  padding:6px 14px; border-radius:20px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  font-size:12px; color:var(--muted); font-weight:600;
  transition:all .4s var(--ease-expo);
  margin-bottom:20px;
}
.status.listening { color:var(--c-listen); border-color:rgba(34,197,94,.3);  background:rgba(34,197,94,.07); }
.status.thinking  { color:var(--c-think);  border-color:rgba(245,158,11,.3); background:rgba(245,158,11,.06); }
.status.speaking  { color:var(--c-speak);  border-color:rgba(59,130,246,.3); background:rgba(59,130,246,.07); }
.status-dot {
  width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0;
}
.status.listening .status-dot { animation:dotPulse .8s ease-in-out infinite; }
.status.thinking  .status-dot { animation:dotPulse .5s ease-in-out infinite; }

/* ── Thinking dots ───────────────────────────────────── */
.think {
  display:none; align-items:center; gap:6px;
  margin-bottom:20px;
}
.think.on { display:flex; }
.tdot {
  width:9px; height:9px; border-radius:50%;
  background:var(--gold);
  animation:bounce 1.2s ease-in-out infinite;
}
.tdot:nth-child(2) { animation-delay:.15s; }
.tdot:nth-child(3) { animation-delay:.30s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-12px);opacity:1} }

/* ── Waveform ────────────────────────────────────────── */
.wave {
  display:flex; align-items:center; gap:3.5px;
  height:52px; margin-bottom:20px;
  opacity:0; pointer-events:none;
  transition:opacity .4s var(--ease-expo);
}
.wave.on { opacity:1; }

.wbar {
  width:4px; min-height:4px;
  border-radius:2px;
  background:var(--c-idle);
  transform-origin:center;
  transition:background .3s;
}

/* Speaking CSS waveform */
.wave.speaking .wbar { background:var(--c-speak); }
.wave.speaking .wbar:nth-child(1)  { animation:ws .55s .00s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(2)  { animation:ws .50s .04s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(3)  { animation:ws .45s .08s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(4)  { animation:ws .55s .12s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(5)  { animation:ws .50s .16s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(6)  { animation:ws .45s .20s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(7)  { animation:ws .55s .16s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(8)  { animation:ws .50s .12s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(9)  { animation:ws .45s .08s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(10) { animation:ws .55s .04s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(11) { animation:ws .50s .08s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(12) { animation:ws .45s .12s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(13) { animation:ws .55s .04s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(14) { animation:ws .50s .00s ease-in-out infinite alternate; }
.wave.speaking .wbar:nth-child(15) { animation:ws .45s .04s ease-in-out infinite alternate; }

@keyframes ws { from{height:4px;opacity:.5} to{height:44px;opacity:1} }

/* Listening: heights driven by JS Web Audio API, fallback css */
.wave.listening .wbar { background:var(--c-listen); }

/* ── Controls ────────────────────────────────────────── */
.controls {
  padding:16px 20px;
  padding-bottom:max(20px,env(safe-area-inset-bottom));
  display:flex; flex-direction:column; align-items:center; gap:14px;
}

/* Mic button */
.mic {
  position:relative;
  width:84px; height:84px; border-radius:50%;
  border:none; cursor:pointer;
  background:linear-gradient(145deg,var(--en-400),var(--en-500));
  color:white;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 10px 36px rgba(37,99,235,.45), 0 0 0 0 rgba(37,99,235,.25);
  transition:transform .15s var(--ease-spring), box-shadow .35s var(--ease-expo), background .35s;
  -webkit-tap-highlight-color:transparent; user-select:none;
}
.mic:hover:not(:disabled) {
  transform:scale(1.06);
  box-shadow:0 14px 44px rgba(37,99,235,.55), 0 0 0 10px rgba(37,99,235,.1);
}
.mic:active:not(:disabled) { transform:scale(.94); }
.mic:disabled { opacity:.45; cursor:not-allowed; }

.mic.listening {
  background:linear-gradient(145deg,#22c55e,#16a34a);
  box-shadow:0 10px 36px rgba(34,197,94,.5);
  animation:micPulse 1.6s ease-in-out infinite;
}
@keyframes micPulse {
  0%,100%{ box-shadow:0 10px 36px rgba(34,197,94,.5), 0 0 0 0   rgba(34,197,94,.25); }
  50%    { box-shadow:0 10px 36px rgba(34,197,94,.6), 0 0 0 18px rgba(34,197,94,.08); }
}

/* Ripple ring on button */
.mic::before {
  content:''; position:absolute; inset:0; border-radius:50%;
  border:2px solid currentColor; opacity:0; transform:scale(1);
}
.mic.listening::before {
  animation:btnRipple 1.6s ease-out infinite;
}
@keyframes btnRipple {
  0%   { transform:scale(1); opacity:.5; }
  100% { transform:scale(1.7); opacity:0; }
}

/* Icon swap */
.i-mic, .i-stop { position:absolute; transition:opacity .2s, transform .25s var(--ease-spring); }
.i-mic  { opacity:1; transform:scale(1); }
.i-stop { opacity:0; transform:scale(.4); }
.mic.listening .i-mic  { opacity:0; transform:scale(.4); }
.mic.listening .i-stop { opacity:1; transform:scale(1); }

/* Mic label */
.mic-lbl {
  font-size:12px; color:var(--muted); font-weight:600;
  transition:color .3s; text-align:center;
}
.mic-lbl.listening { color:var(--c-listen); }

/* ── Response card ───────────────────────────────────── */
.response-card {
  position:fixed;
  bottom:175px; left:50%;
  transform:translateX(-50%) translateY(16px);
  width:calc(100% - 40px); max-width:440px;
  background:rgba(11,31,56,.92);
  backdrop-filter:blur(20px) saturate(1.3);
  border:1px solid rgba(37,99,235,.28);
  border-radius:18px;
  padding:14px 16px;
  opacity:0; pointer-events:none;
  transition:opacity .4s var(--ease-expo), transform .4s var(--ease-expo);
  z-index:10;
}
.response-card.show {
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}
.card-label {
  font-size:11px; font-weight:700; color:var(--en-200);
  display:flex; align-items:center; gap:6px; margin-bottom:8px;
}
.card-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.card-text { font-size:14px; line-height:1.75; color:var(--text); }

/* ── Responsive ─────────────────────────────────────── */
@media (max-height:680px) {
  .av-circle { width:160px; height:160px; }
  .identity .name { font-size:22px; }
  .mic { width:72px; height:72px; }
}

@media (prefers-reduced-motion:reduce) {
  .blob, .av-ring, .av-ripple, .av-glow,
  .wbar, .tdot, .mic, .conn-dot,
  .mic::before { animation:none !important; transition:none !important; }
}
</style>
</head>
<body>

<!-- Ambient -->
<div class="ambient" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<div class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo" aria-hidden="true">إنجو</div>
    <div class="h-info">
      <div class="h-brand">ماجد · إنجوسوفت</div>
      <div class="h-sub">المساعد التعليمي الذكي</div>
    </div>
    <div class="conn" id="conn" aria-live="polite">
      <div class="conn-dot"></div>
      <span id="connTxt">جاري الاتصال...</span>
    </div>
  </header>

  <!-- ── Stage ── -->
  <main class="stage">

    <!-- Avatar -->
    <div class="av-wrap" id="avWrap">
      <div class="av-glow"   aria-hidden="true"></div>
      <div class="av-ring"   aria-hidden="true"></div>
      <div class="av-ripple" aria-hidden="true"></div>
      <div class="av-circle">
        <video id="avideo" autoplay playsinline></video>
        <img id="avPh"
          src="https://i.ibb.co/m5zdZVNN/Gemini-Generated-Image-99rafj99rafj99ra-1.png"
          alt="م. ماجد"
          style="width:100%;height:100%;object-fit:cover;object-position:top center;">
      </div>
    </div>

    <!-- Identity -->
    <div class="identity">
      <div class="name">م. ماجد</div>
      <div class="role">مستشار تعليمي · إنجوسوفت</div>
    </div>

    <!-- Status -->
    <div class="status" id="status" role="status" aria-live="polite">
      <div class="status-dot"></div>
      <span id="statusTxt">جاري الاتصال...</span>
    </div>

    <!-- Thinking dots -->
    <div class="think" id="think" aria-hidden="true">
      <div class="tdot"></div>
      <div class="tdot"></div>
      <div class="tdot"></div>
    </div>

    <!-- Waveform (15 bars) -->
    <div class="wave" id="wave" aria-hidden="true">
      <div class="wbar" data-h="5"></div>
      <div class="wbar" data-h="10"></div>
      <div class="wbar" data-h="18"></div>
      <div class="wbar" data-h="28"></div>
      <div class="wbar" data-h="38"></div>
      <div class="wbar" data-h="44"></div>
      <div class="wbar" data-h="44"></div>
      <div class="wbar" data-h="38"></div>
      <div class="wbar" data-h="44"></div>
      <div class="wbar" data-h="44"></div>
      <div class="wbar" data-h="38"></div>
      <div class="wbar" data-h="28"></div>
      <div class="wbar" data-h="18"></div>
      <div class="wbar" data-h="10"></div>
      <div class="wbar" data-h="5"></div>
    </div>

  </main>

  <!-- ── Controls ── -->
  <footer class="controls">
    <button class="mic" id="micBtn" aria-label="اضغط للتحدث" disabled>
      <!-- Mic SVG -->
      <svg class="i-mic" width="30" height="30" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
      <!-- Stop SVG -->
      <svg class="i-stop" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"
           aria-hidden="true">
        <rect x="6" y="6" width="12" height="12" rx="3"/>
      </svg>
    </button>
    <div class="mic-lbl" id="micLbl">اضغط للتحدث مع ماجد</div>
  </footer>

</div>

<!-- Response card -->
<div class="response-card" id="responseCard" role="alert" aria-live="assertive">
  <div class="card-label"><div class="card-dot"></div>ماجد يقول</div>
  <div class="card-text" id="cardText"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const S = {
  streamId:null, sessionId:null, pc:null,
  history:[], connected:false,
  mode:'idle'   // idle | connecting | listening | thinking | speaking
};

// ── DOM refs ───────────────────────────────────────────────────────────────────
const $video    = document.getElementById('avideo');
const $avPh     = document.getElementById('avPh');
const $avWrap   = document.getElementById('avWrap');
const $conn     = document.getElementById('conn');
const $connTxt  = document.getElementById('connTxt');
const $status   = document.getElementById('status');
const $sTxt     = document.getElementById('statusTxt');
const $think    = document.getElementById('think');
const $wave     = document.getElementById('wave');
const $micBtn   = document.getElementById('micBtn');
const $micLbl   = document.getElementById('micLbl');
const $card     = document.getElementById('responseCard');
const $cardTxt  = document.getElementById('cardText');
const wbars     = document.querySelectorAll('.wbar');

// ── Mode definitions ───────────────────────────────────────────────────────────
const MODE = {
  idle:      { av:'',          st:'',          sTxt:'جاهز للمحادثة',    lbl:'اضغط للتحدث مع ماجد', lblCls:'',          wave:false, think:false, micCls:'' },
  listening: { av:'listening', st:'listening', sTxt:'أنا أستمع...',     lbl:'اضغط للإيقاف',        lblCls:'listening', wave:true,  think:false, micCls:'listening' },
  thinking:  { av:'thinking',  st:'thinking',  sTxt:'جاري التفكير...',  lbl:'جاري المعالجة...',    lblCls:'',          wave:false, think:true,  micCls:'' },
  speaking:  { av:'speaking',  st:'speaking',  sTxt:'ماجد يتحدث...',    lbl:'اضغط للتحدث مع ماجد', lblCls:'',          wave:true,  think:false, micCls:'' },
};

function setMode(m) {
  S.mode = m;
  const c = MODE[m] || MODE.idle;

  $avWrap.className   = 'av-wrap'   + (c.av    ? ' ' + c.av    : '');
  $status.className   = 'status'    + (c.st    ? ' ' + c.st    : '');
  $wave.className     = 'wave'      + (c.wave  ? ' on ' + c.av : '');
  $think.className    = 'think'     + (c.think ? ' on'          : '');
  $micBtn.className   = 'mic'       + (c.micCls? ' ' + c.micCls: '');
  $micLbl.className   = 'mic-lbl'   + (c.lblCls? ' ' + c.lblCls: '');
  $sTxt.textContent   = c.sTxt;
  $micLbl.textContent = c.lbl;
}

// ── Connection badge ───────────────────────────────────────────────────────────
function setConn(state, txt) {
  $conn.className = 'conn ' + state;
  $connTxt.textContent = txt;
  if (state === 'ok') { $micBtn.disabled = false; setMode('idle'); }
}

// ── Response card ──────────────────────────────────────────────────────────────
let cardTimer;
function showCard(text) {
  $cardTxt.textContent = text;
  $card.classList.add('show');
  clearTimeout(cardTimer);
  cardTimer = setTimeout(() => $card.classList.remove('show'), 10000);
}

// ── D-ID WebRTC ────────────────────────────────────────────────────────────────
async function initDID() {
  try {
    const r    = await fetch('/api/did/session', { method:'POST' });
    const sess = await r.json();
    if (!sess.id) { setConn('err','فشل الاتصال'); return; }

    S.streamId  = sess.id;
    S.sessionId = sess.session_id;
    S.pc = new RTCPeerConnection({ iceServers: sess.ice_servers });

    S.pc.ontrack = (e) => {
      if (!e.streams[0]) return;
      // Always update srcObject so both audio + video tracks are captured
      $video.srcObject = e.streams[0];
      $video.muted = false;
      if (e.track.kind === 'video') {
        $video.style.display = 'block';
        $avPh.style.display  = 'none';
      }
      // play() is required after srcObject changes in some browsers
      $video.play().catch(() => {});
    };

    S.pc.onicecandidate = async ({ candidate }) => {
      if (!candidate) return;
      await fetch('/api/did/ice', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ streamId:S.streamId, sessionId:S.sessionId, candidate })
      });
    };

    S.pc.oniceconnectionstatechange = () => {
      if (S.pc.iceConnectionState === 'connected') {
        S.connected = true; setConn('ok','متصل');
      }
    };

    await S.pc.setRemoteDescription(new RTCSessionDescription(sess.offer));
    const answer = await S.pc.createAnswer();
    await S.pc.setLocalDescription(answer);

    await fetch('/api/did/sdp', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ streamId:S.streamId, sessionId:S.sessionId, answer })
    });

    setConn('ok','متصل'); S.connected = true;
  } catch (e) {
    console.error(e); setConn('err','خطأ في الاتصال');
  }
}

// ── Web Audio waveform (microphone visualization) ──────────────────────────────
let audioCtx, analyser, micStream, rafId;
const DEFAULT_H = [...wbars].map(b => parseInt(b.dataset.h));

function startViz(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    analyser.getByteFrequencyData(data);
    wbars.forEach((b, i) => {
      const v = data[Math.floor(i * data.length / wbars.length)];
      b.style.height = Math.max(4, (v / 255) * 44) + 'px';
    });
    rafId = requestAnimationFrame(draw);
  }
  draw();
}

function stopViz() {
  cancelAnimationFrame(rafId);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  wbars.forEach((b, i) => { b.style.height = DEFAULT_H[i] + 'px'; });
}

// ── Chat → Avatar speak ────────────────────────────────────────────────────────
async function sendToMajed(text) {
  if (!text.trim()) return;
  setMode('thinking');
  S.history.push({ role:'user', parts:[{ text }] });

  try {
    const r = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message:text, history:S.history.slice(-10) })
    });
    const { reply } = await r.json();
    S.history.push({ role:'model', parts:[{ text:reply }] });
    showCard(reply);

    if (S.connected && S.streamId) {
      setMode('speaking');
      await fetch('/api/did/speak', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ streamId:S.streamId, sessionId:S.sessionId, text:reply })
      });
      setTimeout(() => setMode('idle'), reply.length * 85 + 1500);
    } else {
      // Browser TTS fallback
      const utt = new SpeechSynthesisUtterance(reply);
      utt.lang = 'ar-SA';
      utt.onend = () => setMode('idle');
      setMode('speaking');
      speechSynthesis.speak(utt);
    }
  } catch {
    showCard('عذراً، حدث خطأ. حاول مرة أخرى.');
    setMode('idle');
  }
}

// ── Speech Recognition ─────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  const rec = new SR();
  rec.lang = 'ar-SA'; rec.continuous = false; rec.interimResults = false;

  rec.onresult = async (e) => {
    const transcript = e.results[0][0].transcript;
    stopViz();
    await sendToMajed(transcript);
  };

  rec.onend = () => {
    if (S.mode === 'listening') { stopViz(); setMode('idle'); }
  };

  rec.onerror = () => { stopViz(); setMode('idle'); };

  $micBtn.addEventListener('click', async () => {
    // Unmute video on first user gesture (browser autoplay policy)
    if ($video.srcObject && $video.muted) {
      $video.muted = false;
      $video.play().catch(() => {});
    }

    if (S.mode === 'listening') {
      rec.stop(); stopViz(); setMode('idle'); return;
    }
    if (S.mode !== 'idle') return;

    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio:true });
      startViz(micStream);
    } catch { /* mic denied — recognition still works */ }

    setMode('listening');
    rec.start();
  });

} else {
  $micLbl.textContent = 'المتصفح لا يدعم التعرف على الصوت';
  $micBtn.style.opacity = '.4';
  $micBtn.disabled = true;
}

// ── Boot ───────────────────────────────────────────────────────────────────────
initDID();
</script>
</body>
